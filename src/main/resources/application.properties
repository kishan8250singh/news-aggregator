spring.application.name=news-aggregator
server.port=8080
#----  Security ─────────────────────────────────────────────
spring.security.user.name=admin
spring.security.user.password=admin123
# ── MySQL Database ───────────────────────────────────────
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/news_aggregator?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${db_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── Google OAuth2 ────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${client-id}
spring.security.oauth2.client.registration.google.client-secret=${client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# ── Logging ──────────────────────────────────────────────
logging.level.com.newsaggregator=DEBUG
logging.level.root=ERROR
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%-5level] %logger{36} - %msg%n
